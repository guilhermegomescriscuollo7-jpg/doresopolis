<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup Secretário</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen font-sans">
<div class="bg-white rounded-2xl shadow-xl p-8 max-w-sm w-full text-center space-y-4">

  <div id="estado-loading" class="">
    <div class="w-12 h-12 border-4 border-gray-200 border-t-green-600 rounded-full animate-spin mx-auto mb-4"></div>
    <p class="text-gray-500 text-sm">Verificando...</p>
  </div>

  <div id="estado-nao-logado" class="hidden">
    <p class="text-2xl mb-2">🔒</p>
    <p class="font-bold text-gray-800 mb-1">Não logado</p>
    <p class="text-sm text-gray-500 mb-4">Faça login no app primeiro.</p>
    <a href="index.html" class="bg-green-600 text-white font-bold px-6 py-2 rounded-xl text-sm">Ir para o App</a>
  </div>

  <div id="estado-ok" class="hidden">
    <p class="text-4xl mb-3">✅</p>
    <p class="font-black text-gray-800 text-lg mb-1">Acesso liberado!</p>
    <p id="nome-usuario" class="text-sm text-gray-500 mb-4"></p>
    <a href="painel-transporte.html" class="inline-block bg-green-600 text-white font-bold px-6 py-3 rounded-xl text-sm">Abrir Painel</a>
  </div>

  <div id="estado-erro" class="hidden">
    <p class="text-4xl mb-3">❌</p>
    <p class="font-bold text-gray-800 mb-1">Erro</p>
    <p id="msg-erro" class="text-sm text-red-500 mb-4"></p>
    <a href="index.html" class="bg-gray-100 text-gray-600 font-bold px-6 py-2 rounded-xl text-sm">Voltar</a>
  </div>

</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const app  = initializeApp({
  apiKey: "AIzaSyAskgM5cxiR4DI2PXrccBxOvPZzMPDKdCo",
  authDomain: "gen-lang-client-0963611393.firebaseapp.com",
  projectId: "gen-lang-client-0963611393",
  storageBucket: "gen-lang-client-0963611393.firebasestorage.app",
  messagingSenderId: "158833761867",
  appId: "1:158833761867:web:f9db6cb6dc6b5785cfb7ce"
});
const auth = getAuth(app);
const db   = getFirestore(app, 'ai-studio-effa6aaf-05b1-45f1-96b5-43601bcc0a4');

function mostrar(id) {
  ['estado-loading','estado-nao-logado','estado-ok','estado-erro']
    .forEach(s => document.getElementById(s).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

onAuthStateChanged(auth, async (user) => {
  if (!user) { mostrar('estado-nao-logado'); return; }
  try {
    await setDoc(doc(db, 'secretarios_transporte', user.uid), {
      nome:  user.displayName || user.email,
      email: user.email,
      uid:   user.uid
    });
    document.getElementById('nome-usuario').textContent = user.displayName || user.email;
    mostrar('estado-ok');
  } catch(e) {
    document.getElementById('msg-erro').textContent = e.message;
    mostrar('estado-erro');
  }
});

setTimeout(() => mostrar('estado-nao-logado'), 8000);
</script>
</body>
</html>
