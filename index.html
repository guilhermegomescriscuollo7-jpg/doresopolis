<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Meta tags para comportamento de WebApp Nativo (PWA) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b5c3b">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>App Doresópolis</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome para os ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Configuração de cores personalizadas do Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        doresopolis: {
                            green: '#0b5c3b',
                            dark: '#3f3f46',
                            light: '#f8fafc'
                        }
                    }
                }
            }
        }
    </script>
</head>

<!-- Fundo escuro para destacar o "celular" se for aberto no computador -->
<body class="bg-gray-200 font-sans text-gray-800 flex justify-center items-center min-h-screen">

    <!-- CONTAINER PRINCIPAL DO APP (Simula a tela do smartphone) -->
    <div class="bg-gray-50 w-full max-w-md h-[100dvh] flex flex-col relative shadow-2xl overflow-hidden sm:rounded-xl sm:h-[95vh] sm:border sm:border-gray-300">
        
        <!-- HEADER (Fixo no topo) -->
        <header class="bg-white shadow-sm border-b border-gray-200 z-10 flex-shrink-0">
            <!-- Faixa verde superior -->
            <div class="bg-doresopolis-green h-2 w-full"></div>
            
            <div class="px-4 py-3 flex items-center justify-between">
                <!-- Logo e Título -->
                <div class="flex items-center space-x-3 w-full">
                    <div class="w-10 h-10 border-2 border-doresopolis-green rounded-full flex items-center justify-center text-doresopolis-green font-bold text-[8px] bg-gray-50 shadow-inner flex-shrink-0">
                        BRASÃO
                    </div>
                    <div>
                        <p class="text-[9px] tracking-[0.1em] text-gray-500 uppercase font-semibold leading-none">Prefeitura de</p>
                        <h1 class="text-xl font-black text-gray-700 tracking-tight uppercase leading-none mt-1">Doresópolis</h1>
                    </div>
                </div>
                <!-- Botão de perfil/notificações (Opcional) -->
                <button class="text-gray-400 hover:text-doresopolis-green">
                    <i class="fa-regular fa-bell text-xl"></i>
                </button>
            </div>

            <!-- Barra de Pesquisa Integrada no Header -->
            <div class="px-4 pb-3">
                <div class="relative text-gray-400 focus-within:text-doresopolis-green">
                    <input type="text" placeholder="Buscar serviços..." class="w-full bg-gray-100 border-none rounded-full py-2 pl-4 pr-10 focus:outline-none focus:ring-2 focus:ring-doresopolis-green text-sm transition-colors">
                    <button class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- ÁREA ROLÁVEL (Conteúdo) -->
        <main class="flex-grow overflow-y-auto overflow-x-hidden p-4 pb-24 scroll-smooth">
            
            <!-- Saudação -->
            <div class="mb-6 mt-2">
                <h2 class="text-xl font-bold text-gray-800">Olá, Cidadão!</h2>
                <p class="text-gray-500 mt-1 text-sm leading-snug">Selecione uma secretaria abaixo para solicitar serviços.</p>
            </div>

            <!-- LISTA DE SECRETARIAS (1 Coluna) -->
            <div class="flex flex-col gap-3">
                
                <!-- Saúde -->
                <button onclick="navegarPara('saude')" class="flex items-center p-4 bg-white rounded-xl shadow-sm border border-gray-100 active:bg-gray-50 active:scale-[0.98] transition-all duration-150 text-left">
                    <div class="p-3 bg-red-50 text-red-600 rounded-lg">
                        <i class="fa-solid fa-heart-pulse text-lg w-5 text-center"></i>
                    </div>
                    <div class="ml-4 flex-grow">
                        <h3 class="font-bold text-gray-800 text-sm">Saúde</h3>
                        <p class="text-[11px] text-gray-500 mt-0.5">Consultas, vacinas e remédios</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>
                </button>

                <!-- Educação -->
                <button onclick="navegarPara('educacao')" class="flex items-center p-4 bg-white rounded-xl shadow-sm border border-gray-100 active:bg-gray-50 active:scale-[0.98] transition-all duration-150 text-left">
                    <div class="p-3 bg-blue-50 text-blue-600 rounded-lg">
                        <i class="fa-solid fa-graduation-cap text-lg w-5 text-center"></i>
                    </div>
                    <div class="ml-4 flex-grow">
                        <h3 class="font-bold text-gray-800 text-sm">Educação</h3>
                        <p class="text-[11px] text-gray-500 mt-0.5">Matrículas e transporte escolar</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>
                </button>

                <!-- Tributos -->
                <button onclick="navegarPara('tributos')" class="flex items-center p-4 bg-white rounded-xl shadow-sm border border-gray-100 active:bg-gray-50 active:scale-[0.98] transition-all duration-150 text-left">
                    <div class="p-3 bg-green-50 text-green-600 rounded-lg">
                        <i class="fa-solid fa-file-invoice-dollar text-lg w-5 text-center"></i>
                    </div>
                    <div class="ml-4 flex-grow">
                        <h3 class="font-bold text-gray-800 text-sm">Tributos</h3>
                        <p class="text-[11px] text-gray-500 mt-0.5">Emissão de IPTU e taxas</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>
                </button>

                <!-- Obras -->
                <button onclick="navegarPara('obras')" class="flex items-center p-4 bg-white rounded-xl shadow-sm border border-gray-100 active:bg-gray-50 active:scale-[0.98] transition-all duration-150 text-left">
                    <div class="p-3 bg-amber-50 text-amber-600 rounded-lg">
                        <i class="fa-solid fa-helmet-safety text-lg w-5 text-center"></i>
                    </div>
                    <div class="ml-4 flex-grow">
                        <h3 class="font-bold text-gray-800 text-sm">Obras</h3>
                        <p class="text-[11px] text-gray-500 mt-0.5">Iluminação e manutenção</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>
                </button>

                <!-- Transporte -->
                <button onclick="navegarPara('transporte')" class="flex items-center p-4 bg-white rounded-xl shadow-sm border border-gray-100 active:bg-gray-50 active:scale-[0.98] transition-all duration-150 text-left">
                    <div class="p-3 bg-purple-50 text-purple-600 rounded-lg">
                        <i class="fa-solid fa-bus text-lg w-5 text-center"></i>
                    </div>
                    <div class="ml-4 flex-grow">
                        <h3 class="font-bold text-gray-800 text-sm">Transporte</h3>
                        <p class="text-[11px] text-gray-500 mt-0.5">Horários e estradas rurais</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>
                </button>

                <!-- Esporte -->
                <button onclick="navegarPara('esporte')" class="flex items-center p-4 bg-white rounded-xl shadow-sm border border-gray-100 active:bg-gray-50 active:scale-[0.98] transition-all duration-150 text-left">
                    <div class="p-3 bg-orange-50 text-orange-600 rounded-lg">
                        <i class="fa-solid fa-trophy text-lg w-5 text-center"></i>
                    </div>
                    <div class="ml-4 flex-grow">
                        <h3 class="font-bold text-gray-800 text-sm">Esporte</h3>
                        <p class="text-[11px] text-gray-500 mt-0.5">Inscrições e campeonatos</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>
                </button>

            </div>
            
            <!-- Espaço no final para não ficar grudado na navegação -->
            <div class="h-6 w-full text-center mt-6">
                <span class="text-[10px] text-gray-400">App Oficial - Doresópolis MG</span>
            </div>
        </main>

        <!-- BARRA DE NAVEGAÇÃO INFERIOR (Padrão de App Nativo) -->
        <nav class="absolute bottom-0 w-full bg-white border-t border-gray-200 z-50 pb-safe">
            <div class="flex justify-around items-center h-16">
                
                <!-- Início -->
                <a href="#" class="flex flex-col items-center justify-center w-full h-full text-doresopolis-green">
                    <i class="fa-solid fa-house text-lg mb-1"></i>
                    <span class="text-[10px] font-medium">Início</span>
                </a>

                <!-- A Nossa Cidade -->
                <a href="https://www.doresopolis.mg.gov.br/portal/servicos/1001/historia/" target="_blank" class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-doresopolis-green transition-colors">
                    <i class="fa-solid fa-map-location-dot text-lg mb-1"></i>
                    <span class="text-[10px] font-medium">A Cidade</span>
                </a>

                <!-- Ouvidoria -->
                <a href="https://www.doresopolis.mg.gov.br/portal/ouvidoria" target="_blank" class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-doresopolis-green transition-colors">
                    <i class="fa-solid fa-bullhorn text-lg mb-1"></i>
                    <span class="text-[10px] font-medium">Ouvidoria</span>
                </a>

                <!-- Transparência -->
                <a href="https://ilai.memory.com.br/#/public/inicio" target="_blank" class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-doresopolis-green transition-colors">
                    <i class="fa-solid fa-chart-pie text-lg mb-1"></i>
                    <span class="text-[10px] font-medium">Transparência</span>
                </a>

            </div>
        </nav>

    </div>

    <!-- SCRIPT DE NAVEGAÇÃO INTERNA -->
    <script>
        function navegarPara(secretaria) {
            // Vibração ao clicar (funciona apenas em dispositivos móveis reais)
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
            alert('Acessando aba: ' + secretaria.toUpperCase());
        }
    </script>

</body>
</html>
