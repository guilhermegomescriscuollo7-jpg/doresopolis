<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#7c3aed">
<title>Transporte - App Doresópolis</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script>
tailwind.config = {
  theme: { extend: { colors: { doresopolis: { green: '#0b5c3b' } } } }
}
</script>
</head>
<body class="bg-gray-200 font-sans text-gray-800 flex justify-center items-center min-h-screen">

<div class="bg-gray-50 w-full max-w-md h-[100dvh] flex flex-col relative shadow-2xl overflow-hidden sm:rounded-xl sm:h-[95vh] sm:border sm:border-gray-300">

  <!-- HEADER -->
  <header class="bg-white shadow-sm z-10 flex-shrink-0">
    <div class="bg-purple-600 h-1.5 w-full"></div>
    <div class="px-4 py-3 flex items-center gap-3">
      <a href="index.html" class="w-9 h-9 rounded-full bg-gray-100 text-gray-500 flex items-center justify-center shrink-0">
        <i class="fa-solid fa-arrow-left text-sm"></i>
      </a>
      <div class="flex items-center gap-3 flex-grow">
        <div class="w-9 h-9 rounded-full bg-purple-50 text-purple-600 flex items-center justify-center shrink-0">
          <i class="fa-solid fa-bus"></i>
        </div>
        <div>
          <p class="text-[9px] tracking-widest text-gray-400 uppercase font-semibold leading-none">Mobilidade Urbana e Rural</p>
          <h1 class="text-lg font-black text-gray-800 uppercase tracking-tight leading-none">Sec. Transporte</h1>
        </div>
      </div>
    </div>
  </header>

  <!-- CONTEÚDO -->
  <main class="flex-grow flex flex-col px-4 py-6 gap-4">

    <a href="transporte-horarios.html" class="flex items-center gap-4 bg-white rounded-2xl border border-gray-100 shadow-sm p-5 active:scale-[0.97] transition-all">
      <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center shrink-0">
        <i class="fa-solid fa-clock text-blue-500 text-2xl"></i>
      </div>
      <div class="flex-grow">
        <p class="font-black text-gray-800 text-base leading-tight">Horários</p>
        <p class="text-[12px] text-gray-400 mt-0.5">Linhas e horários de ônibus</p>
      </div>
      <i class="fa-solid fa-chevron-right text-gray-300 shrink-0"></i>
    </a>

    <a href="transporte-carteira.html" class="flex items-center gap-4 bg-white rounded-2xl border border-gray-100 shadow-sm p-5 active:scale-[0.97] transition-all">
      <div class="w-14 h-14 bg-purple-50 rounded-2xl flex items-center justify-center shrink-0">
        <i class="fa-solid fa-id-card text-purple-500 text-2xl"></i>
      </div>
      <div class="flex-grow">
        <p class="font-black text-gray-800 text-base leading-tight">Minha Carteirinha Digital</p>
        <p class="text-[12px] text-gray-400 mt-0.5">Acesso exclusivo para inscritos</p>
      </div>
      <i class="fa-solid fa-chevron-right text-gray-300 shrink-0"></i>
    </a>

    <a href="transporte-inscricoes.html" class="flex items-center gap-4 bg-white rounded-2xl border border-gray-100 shadow-sm p-5 active:scale-[0.97] transition-all">
      <div class="w-14 h-14 bg-green-50 rounded-2xl flex items-center justify-center shrink-0">
        <i class="fa-solid fa-file-pen text-green-600 text-2xl"></i>
      </div>
      <div class="flex-grow">
        <p class="font-black text-gray-800 text-base leading-tight">Inscrições</p>
        <p class="text-[12px] text-gray-400 mt-0.5">Transporte escolar e trabalhador</p>
      </div>
      <i class="fa-solid fa-chevron-right text-gray-300 shrink-0"></i>
    </a>

  </main>

</div>
</body>
</html>
