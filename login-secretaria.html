<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b5c3b">
<title>Login Secretaria - Doresópolis</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script>tailwind.config={theme:{extend:{colors:{doresopolis:{green:'#0b5c3b'}}}}}</script>
<style>input{outline:none;}input:focus{box-shadow:0 0 0 2px #0b5c3b;}</style>
</head>
<body class="bg-gray-100 font-sans flex justify-center items-center min-h-screen">
<div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden">

  <!-- Topo verde -->
  <div class="bg-doresopolis-green px-6 py-8 text-center">
    <div class="w-16 h-16 bg-white/10 rounded-2xl flex items-center justify-center mx-auto mb-3">
      <i class="fa-solid fa-building-columns text-white text-2xl"></i>
    </div>
    <p class="text-green-200 text-[11px] uppercase tracking-widest font-semibold">Prefeitura de Doresópolis</p>
    <h1 class="text-white font-black text-xl uppercase tracking-tight mt-0.5">Acesso Secretaria</h1>
  </div>

  <!-- Formulário -->
  <div class="px-6 py-6 space-y-4">

    <div id="estado-logado" class="hidden text-center py-4">
      <div class="w-10 h-10 border-4 border-green-200 border-t-doresopolis-green rounded-full animate-spin mx-auto mb-3"></div>
      <p class="text-sm text-gray-400">Redirecionando...</p>
    </div>

    <form id="form-login" class="space-y-4">
      <div>
        <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">E-mail</label>
        <div class="relative">
          <i class="fa-solid fa-envelope absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i>
          <input id="f-email" type="email" placeholder="secretaria@doresopolis.mg.gov.br" required
            class="w-full bg-gray-50 border border-gray-200 rounded-xl pl-10 pr-4 py-3 text-sm text-gray-800 placeholder-gray-300">
        </div>
      </div>

      <div>
        <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">Senha</label>
        <div class="relative">
          <i class="fa-solid fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i>
          <input id="f-senha" type="password" placeholder="••••••••" required
            class="w-full bg-gray-50 border border-gray-200 rounded-xl pl-10 pr-10 py-3 text-sm text-gray-800 placeholder-gray-300">
          <button type="button" id="toggle-senha"
            class="absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-300 text-sm">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
      </div>

      <div id="msg-erro" class="hidden bg-red-50 border border-red-100 rounded-xl px-4 py-3 text-sm text-red-600 flex items-center gap-2">
        <i class="fa-solid fa-circle-exclamation shrink-0"></i>
        <span id="msg-erro-txt"></span>
      </div>

      <button type="submit" id="btn-login"
        class="w-full bg-doresopolis-green text-white font-black py-3.5 rounded-2xl shadow-md active:scale-[0.98] transition-all text-sm uppercase tracking-wide">
        <span id="btn-txt"><i class="fa-solid fa-right-to-bracket mr-2"></i>Entrar</span>
        <span id="btn-load" class="hidden"><i class="fa-solid fa-spinner fa-spin mr-2"></i>Verificando...</span>
      </button>
    </form>

    <p class="text-center text-[10px] text-gray-300 pt-2">
      Acesso restrito a servidores municipais autorizados
    </p>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAskgM5cxiR4DI2PXrccBxOvPZzMPDKdCo",
  authDomain: "gen-lang-client-0963611393.firebaseapp.com",
  projectId: "gen-lang-client-0963611393",
  storageBucket: "gen-lang-client-0963611393.firebasestorage.app",
  messagingSenderId: "158833761867",
  appId: "1:158833761867:web:f9db6cb6dc6b5785cfb7ce"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// Rotas por secretaria
const rotas = {
  transporte: 'painel-transporte.html',
  saude:      'painel-saude.html',
  educacao:   'painel-educacao.html',
  tributos:   'painel-tributos.html',
  obras:      'painel-obras.html',
  ti:         'painel-ti.html',
};

async function redirecionarSeLogado(user) {
  const snap = await getDoc(doc(db, 'contas_secretaria', user.uid));
  if (snap.exists() && snap.data().ativo !== false) {
    const destino = rotas[snap.data().secretaria] || 'index.html';
    window.location.href = destino;
    return true;
  }
  return false;
}

// Verifica se já está logado
onAuthStateChanged(auth, async (user) => {
  if (!user) return; // não logado — formulário já visível por padrão

  // Só redireciona se for login por e-mail/senha (não Google)
  const isEmailAuth = user.providerData.some(p => p.providerId === 'password');
  if (!isEmailAuth) {
    // Conta Google não pertence a este sistema — desloga silenciosamente
    await signOut(auth);
    return;
  }

  try {
    document.getElementById('form-login').classList.add('hidden');
    document.getElementById('estado-logado').classList.remove('hidden');
    const redirecionou = await redirecionarSeLogado(user);
    if (!redirecionou) {
      await signOut(auth);
      document.getElementById('estado-logado').classList.add('hidden');
      document.getElementById('form-login').classList.remove('hidden');
    }
  } catch(e) {
    await signOut(auth);
    document.getElementById('estado-logado').classList.add('hidden');
    document.getElementById('form-login').classList.remove('hidden');
  }
});

// Toggle senha
document.getElementById('toggle-senha').addEventListener('click', function() {
  const input = document.getElementById('f-senha');
  const icon  = this.querySelector('i');
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'fa-solid fa-eye-slash';
  } else {
    input.type = 'password';
    icon.className = 'fa-solid fa-eye';
  }
});

// Login
document.getElementById('form-login').addEventListener('submit', async (e) => {
  e.preventDefault();
  document.getElementById('msg-erro').classList.add('hidden');
  document.getElementById('btn-txt').classList.add('hidden');
  document.getElementById('btn-load').classList.remove('hidden');
  document.getElementById('btn-login').disabled = true;

  const email = document.getElementById('f-email').value.trim();
  const senha = document.getElementById('f-senha').value;

  try {
    const cred = await signInWithEmailAndPassword(auth, email, senha);
    const redirecionou = await redirecionarSeLogado(cred.user);
    if (!redirecionou) {
      mostrarErro('Conta não autorizada. Contate a TI.');
    }
  } catch (err) {
    const msgs = {
      'auth/user-not-found':   'E-mail não cadastrado.',
      'auth/wrong-password':   'Senha incorreta.',
      'auth/invalid-email':    'E-mail inválido.',
      'auth/too-many-requests':'Muitas tentativas. Aguarde alguns minutos.',
      'auth/invalid-credential': 'E-mail ou senha incorretos.',
    };
    mostrarErro(msgs[err.code] || 'Erro ao entrar. Tente novamente.');
  }
});

function mostrarErro(msg) {
  document.getElementById('msg-erro-txt').textContent = msg;
  document.getElementById('msg-erro').classList.remove('hidden');
  document.getElementById('btn-txt').classList.remove('hidden');
  document.getElementById('btn-load').classList.add('hidden');
  document.getElementById('btn-login').disabled = false;
}
</script>
</body>
</html>
