<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b5c3b">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>Painel Sec. Obras | Doresópolis</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        doresopolis: {
                            green: '#0b5c3b',
                            dark: '#3f3f46',
                            light: '#f8fafc'
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-200 font-sans text-gray-800 flex justify-center items-center min-h-screen">

    <!-- NOTIFICAÇÃO NO APP (TOAST) -->
    <div id="toast-aviso" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-[100] bg-green-600 text-white px-5 py-3 rounded-xl shadow-lg flex items-center gap-3 transition-all duration-300 opacity-0 pointer-events-none translate-y-[-20px] w-11/12 max-w-sm">
        <i id="toast-icone" class="fa-solid fa-circle-check text-lg"></i>
        <span id="toast-mensagem" class="text-sm font-medium leading-snug"></span>
    </div>

    <!-- CONTAINER PRINCIPAL DO APP (Formato Smartphone) -->
    <div class="bg-gray-50 w-full max-w-md h-[100dvh] flex flex-col relative shadow-2xl overflow-hidden sm:rounded-xl sm:h-[95vh] sm:border sm:border-gray-300">
        
        <!-- HEADER -->
        <header class="bg-white shadow-sm border-b border-gray-200 z-10 flex-shrink-0">
            <div class="bg-doresopolis-green h-2 w-full"></div>
            <div class="px-4 py-3 flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <img src="https://cdn.tecconcursos.com.br/figuras/7528d9ce-3894-4606-a0ed-7b57ef6cb7ed" alt="Brasão" class="w-10 h-10 object-contain flex-shrink-0 drop-shadow-sm">
                    <div>
                        <p class="text-[9px] tracking-[0.1em] text-gray-500 uppercase font-semibold leading-none">Painel de Gestão</p>
                        <h1 class="text-xl font-black text-gray-700 tracking-tight uppercase leading-none mt-1">Sec. Obras</h1>
                    </div>
                </div>
                <button onclick="fazerLogout()" class="text-red-400 hover:text-red-600 ml-2" title="Sair do Painel">
                    <i class="fa-solid fa-right-from-bracket text-xl"></i>
                </button>
            </div>
        </header>

        <!-- ========================================== -->
        <!-- ABA 1: GESTÃO DE SOLICITAÇÕES              -->
        <!-- ========================================== -->
        <main id="aba-solicitacoes" class="flex-grow overflow-y-auto p-4 pb-24 scroll-smooth block">
            
            <!-- Cards de Estatísticas -->
            <div class="grid grid-cols-3 gap-2 mb-6">
                <div class="bg-white p-3 rounded-xl border border-gray-200 shadow-sm border-t-4 border-t-red-500 text-center">
                    <h3 id="stat-pendentes" class="text-2xl font-black text-gray-800">0</h3>
                    <p class="text-[9px] text-gray-500 font-bold uppercase mt-1">Pendentes</p>
                </div>
                <div class="bg-white p-3 rounded-xl border border-gray-200 shadow-sm border-t-4 border-t-blue-500 text-center">
                    <h3 id="stat-andamento" class="text-2xl font-black text-gray-800">0</h3>
                    <p class="text-[9px] text-gray-500 font-bold uppercase mt-1">Andamento</p>
                </div>
                <div class="bg-white p-3 rounded-xl border border-gray-200 shadow-sm border-t-4 border-t-green-500 text-center">
                    <h3 id="stat-concluidos" class="text-2xl font-black text-gray-800">0</h3>
                    <p class="text-[9px] text-gray-500 font-bold uppercase mt-1">Concluídos</p>
                </div>
            </div>

            <h3 class="font-bold text-gray-800 text-sm mb-3 border-l-4 border-amber-500 pl-2">Solicitações Recebidas</h3>
            
            <!-- Lista de Solicitações -->
            <div id="lista-solicitacoes" class="flex flex-col gap-3">
                <div class="text-center py-8 text-gray-400 text-sm">
                    <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i><br>
                    Escutando solicitações do cidadão...
                </div>
            </div>

        </main>

        <!-- ========================================== -->
        <!-- ABA 2: MURAL DE AVISOS (CRUD)              -->
        <!-- ========================================== -->
        <main id="aba-avisos" class="flex-grow overflow-y-auto p-4 pb-24 scroll-smooth hidden">
            
            <!-- Formulário Criar/Editar Aviso -->
            <div class="bg-gradient-to-br from-amber-50 to-white rounded-xl border border-amber-200 shadow-sm overflow-hidden mb-6">
                <div class="px-4 py-3 bg-amber-500 text-white flex items-center gap-2">
                    <i class="fa-solid fa-mobile-screen"></i>
                    <div>
                        <h3 id="titulo-form-aviso" class="font-bold text-sm leading-tight">Publicar Novo Aviso</h3>
                    </div>
                </div>
                
                <form onsubmit="salvarAviso(event)" class="p-4 space-y-3">
                    <input type="hidden" id="aviso-id">

                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">Título</label>
                        <input type="text" id="aviso-titulo" required placeholder="Ex: Interdição de Rua" class="w-full px-3 py-2.5 bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 text-sm">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">Descrição</label>
                        <textarea id="aviso-descricao" required rows="3" placeholder="Detalhes do aviso..." class="w-full px-3 py-2.5 bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 text-sm resize-none"></textarea>
                    </div>

                    <div class="flex gap-2 pt-2">
                        <button type="button" id="btn-cancelar-aviso" onclick="cancelarEdicao()" class="hidden w-1/3 bg-gray-200 text-gray-600 font-bold py-2.5 rounded-lg shadow-sm hover:bg-gray-300 active:scale-[0.98] transition-all text-sm">
                            Cancelar
                        </button>
                        <button type="submit" id="btn-salvar-aviso" class="w-full bg-amber-500 text-white font-bold py-2.5 rounded-lg shadow-sm hover:bg-amber-600 active:scale-[0.98] transition-all flex justify-center items-center gap-2 text-sm">
                            <i class="fa-solid fa-paper-plane"></i> <span id="texto-btn-salvar">Publicar</span>
                        </button>
                    </div>
                </form>
            </div>

            <h3 class="font-bold text-gray-800 text-sm mb-3 border-l-4 border-amber-500 pl-2">Avisos Publicados</h3>
            
            <!-- Lista de Avisos -->
            <div id="lista-avisos" class="flex flex-col gap-3">
                <div class="text-center py-6 text-gray-400 text-sm">
                    <i class="fa-solid fa-spinner fa-spin mb-2"></i><br>Carregando avisos...
                </div>
            </div>

        </main>

        <!-- ========================================== -->
        <!-- BARRA DE NAVEGAÇÃO INFERIOR                -->
        <!-- ========================================== -->
        <nav class="absolute bottom-0 w-full bg-white border-t border-gray-200 z-50 pb-safe">
            <div class="flex justify-around items-center h-16 relative">
                
                <a href="#" onclick="trocarAba('solicitacoes')" id="btn-aba-solicitacoes" class="flex flex-col items-center justify-center w-full h-full text-doresopolis-green transition-colors">
                    <i class="fa-solid fa-helmet-safety text-xl mb-1"></i>
                    <span class="text-[10px] font-bold">Solicitações</span>
                </a>
                
                <!-- Divisor visual -->
                <div class="w-px h-8 bg-gray-200"></div>

                <a href="#" onclick="trocarAba('avisos')" id="btn-aba-avisos" class="flex flex-col items-center justify-center w-full h-full text-gray-400 transition-colors">
                    <i class="fa-solid fa-bullhorn text-xl mb-1"></i>
                    <span class="text-[10px] font-bold">Avisos no App</span>
                </a>

            </div>
        </nav>

    </div>

    <!-- SCRIPT DE LÓGICA E FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        // Importações completas
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpaNuC1IUkteO4fHzFPiNS7s580EyTleU",
            authDomain: "doresopolis.firebaseapp.com",
            projectId: "doresopolis",
            storageBucket: "doresopolis.firebasestorage.app",
            messagingSenderId: "465119846468",
            appId: "1:465119846468:web:8b292481fec10132cf9c11",
            measurementId: "G-WXWGXEWY53"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app); 

        // --- SISTEMA DE TOAST (AVISOS NA TELA) ---
        window.mostrarAviso = function(mensagem, tipo = 'sucesso') {
            const toast = document.getElementById('toast-aviso');
            const icone = document.getElementById('toast-icone');
            document.getElementById('toast-mensagem').innerText = mensagem;

            if(tipo === 'sucesso') {
                toast.classList.remove('bg-red-600');
                toast.classList.add('bg-green-600');
                icone.className = 'fa-solid fa-circle-check text-lg';
            } else {
                toast.classList.remove('bg-green-600');
                toast.classList.add('bg-red-600');
                icone.className = 'fa-solid fa-circle-exclamation text-lg';
            }

            toast.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-[-20px]');
            toast.classList.add('opacity-100', 'translate-y-0');

            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'pointer-events-none', 'translate-y-[-20px]');
            }, 3000);
        };

        // --- TROCAR ABAS (NAVEGAÇÃO INFERIOR) ---
        window.trocarAba = function(aba) {
            const abaSolicitacoes = document.getElementById('aba-solicitacoes');
            const abaAvisos = document.getElementById('aba-avisos');
            const btnSolicitacoes = document.getElementById('btn-aba-solicitacoes');
            const btnAvisos = document.getElementById('btn-aba-avisos');

            if (aba === 'solicitacoes') {
                abaSolicitacoes.classList.remove('hidden');
                abaAvisos.classList.add('hidden');
                
                btnSolicitacoes.classList.replace('text-gray-400', 'text-doresopolis-green');
                btnAvisos.classList.replace('text-doresopolis-green', 'text-gray-400');
            } else {
                abaAvisos.classList.remove('hidden');
                abaSolicitacoes.classList.add('hidden');
                
                btnAvisos.classList.replace('text-gray-400', 'text-doresopolis-green');
                btnSolicitacoes.classList.replace('text-doresopolis-green', 'text-gray-400');
            }
        };

        // --- 1. GESTÃO DE SOLICITAÇÕES (REAL-TIME) ---
        const solicitacoesRef = collection(db, "solicitacoes_obras");
        const qSolicitacoes = query(solicitacoesRef, orderBy("dataRegistro", "desc"));

        onSnapshot(qSolicitacoes, (snapshot) => {
            const container = document.getElementById("lista-solicitacoes");
            
            if (snapshot.empty) {
                container.innerHTML = `<div class="text-center py-6 text-gray-500 text-sm">Nenhuma solicitação encontrada.</div>`;
                document.getElementById("stat-pendentes").innerText = '0';
                document.getElementById("stat-andamento").innerText = '0';
                document.getElementById("stat-concluidos").innerText = '0';
                return;
            }

            container.innerHTML = "";
            let contPendentes = 0;
            let contAndamento = 0;
            let contConcluidos = 0;

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;

                if(data.status === 'PENDENTE') contPendentes++;
                else if(data.status === 'EM ANDAMENTO') contAndamento++;
                else if(data.status === 'CONCLUÍDO') contConcluidos++;

                const fotoHtml = data.fotoUrl 
                    ? `<img src="${data.fotoUrl}" class="w-full h-full object-cover">` 
                    : `<i class="fa-solid fa-image text-gray-300 text-2xl"></i>`;

                let corSelect = 'text-red-600 bg-red-50 border-red-200';
                if(data.status === 'EM ANDAMENTO') corSelect = 'text-blue-600 bg-blue-50 border-blue-200';
                else if(data.status === 'CONCLUÍDO') corSelect = 'text-green-600 bg-green-50 border-green-200';

                const card = `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-3 flex flex-col gap-3">
                        <div class="flex gap-3 items-center">
                            <div class="w-14 h-14 rounded-lg bg-gray-100 flex items-center justify-center flex-shrink-0 overflow-hidden">
                                ${fotoHtml}
                            </div>
                            <div class="flex-grow">
                                <h4 class="font-bold text-gray-800 text-sm leading-tight">${data.tipoServico || 'Reparo Geral'}</h4>
                                <p class="text-xs text-gray-500 mt-0.5 truncate"><i class="fa-regular fa-user mr-1"></i> ${data.nomeCidadao || 'Não informado'}</p>
                                <p class="text-xs text-red-500 mt-0.5 truncate max-w-[200px]"><i class="fa-solid fa-location-dot mr-1"></i> ${data.endereco || 'Não informado'}</p>
                            </div>
                        </div>
                        <div class="flex justify-between items-center border-t border-gray-50 pt-2 mt-1">
                            <span class="text-[10px] text-gray-400 font-medium">Urgência: <span class="font-bold text-gray-700">${data.urgencia || 'N/A'}</span></span>
                            <select onchange="atualizarStatusBD('${id}', this.value)" class="text-[10px] font-bold border rounded-full px-2 py-1 outline-none cursor-pointer ${corSelect}">
                                <option value="PENDENTE" ${data.status === 'PENDENTE' ? 'selected' : ''}>PENDENTE</option>
                                <option value="EM ANDAMENTO" ${data.status === 'EM ANDAMENTO' ? 'selected' : ''}>ANDAMENTO</option>
                                <option value="CONCLUÍDO" ${data.status === 'CONCLUÍDO' ? 'selected' : ''}>CONCLUÍDO</option>
                            </select>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });

            document.getElementById("stat-pendentes").innerText = contPendentes;
            document.getElementById("stat-andamento").innerText = contAndamento;
            document.getElementById("stat-concluidos").innerText = contConcluidos;
        }, (error) => {
            console.error("Erro ao puxar solicitações:", error);
        });

        window.atualizarStatusBD = async function(id, novoStatus) {
            try {
                await updateDoc(doc(db, "solicitacoes_obras", id), { status: novoStatus });
                mostrarAviso("Status atualizado com sucesso!");
            } catch (error) {
                mostrarAviso("Erro ao atualizar o status.", "erro");
            }
        };

        // --- 2. GESTÃO DE AVISOS (CRUD COMPLETO SEM ERRO DE INDEX) ---
        const avisosRef = collection(db, "avisos");
        // Buscamos ordenando por data. O filtro da Secretaria será feito no JS para evitar erro de Index no Firebase!
        const qAvisos = query(avisosRef, orderBy("dataPublicacao", "desc"));

        onSnapshot(qAvisos, (snapshot) => {
            const container = document.getElementById("lista-avisos");
            
            if (snapshot.empty) {
                container.innerHTML = `<p class="text-center text-xs text-gray-400 py-4">Nenhum aviso publicado.</p>`;
                return;
            }
            
            container.innerHTML = "";
            let encontrouAvisos = false;

            snapshot.forEach((docSnap) => {
                const aviso = docSnap.data();
                const id = docSnap.id;
                
                // Filtra aqui no Javascript para contornar a exigência de Índice Composto do Firebase
                if(aviso.secretaria !== "Obras") return;
                
                encontrouAvisos = true;
                const dataFormatada = new Date(aviso.dataPublicacao).toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', year:'2-digit'});

                const card = `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-3">
                        <div class="flex justify-between items-start">
                            <h4 class="font-bold text-gray-800 text-sm leading-tight pr-2">${aviso.titulo}</h4>
                            <span class="text-[9px] text-gray-400 whitespace-nowrap">${dataFormatada}</span>
                        </div>
                        <p class="text-xs text-gray-500 mt-1.5 line-clamp-2">${aviso.descricao}</p>
                        
                        <div class="flex justify-end gap-2 mt-3 pt-2 border-t border-gray-100">
                            <!-- Passando Replace para evitar que aspas no texto quebrem a função -->
                            <button onclick="prepararEdicao('${id}', '${aviso.titulo.replace(/'/g, "\\'")}', '${aviso.descricao.replace(/'/g, "\\'")}')" class="text-blue-500 bg-blue-50 hover:bg-blue-100 px-3 py-1 rounded-md text-[10px] font-bold transition-colors">
                                <i class="fa-solid fa-pen mr-1"></i> Editar
                            </button>
                            <button onclick="excluirAviso('${id}')" class="text-red-500 bg-red-50 hover:bg-red-100 px-3 py-1 rounded-md text-[10px] font-bold transition-colors">
                                <i class="fa-solid fa-trash mr-1"></i> Excluir
                            </button>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });

            if (!encontrouAvisos) {
                container.innerHTML = `<p class="text-center text-xs text-gray-400 py-4">Nenhum aviso publicado.</p>`;
            }
        }, (error) => {
            console.error("Erro ao puxar avisos:", error);
            document.getElementById("lista-avisos").innerHTML = `<p class="text-center text-xs text-red-500 py-4">Erro ao carregar o mural.</p>`;
        });

        // Salvar (Criar ou Atualizar) Aviso
        window.salvarAviso = async function(event) {
            event.preventDefault();
            const btn = document.getElementById('btn-salvar-aviso');

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Salvando...';

            const idAviso = document.getElementById('aviso-id').value;
            const titulo = document.getElementById('aviso-titulo').value;
            const descricao = document.getElementById('aviso-descricao').value;

            try {
                if (idAviso) {
                    await updateDoc(doc(db, "avisos", idAviso), {
                        titulo: titulo,
                        descricao: descricao
                    });
                    mostrarAviso("Aviso alterado com sucesso!");
                    cancelarEdicao(); 
                } else {
                    await addDoc(avisosRef, {
                        secretaria: "Obras",
                        titulo: titulo,
                        descricao: descricao,
                        dataPublicacao: new Date().toISOString()
                    });
                    mostrarAviso("Aviso publicado no app!");
                    document.getElementById('aviso-titulo').value = '';
                    document.getElementById('aviso-descricao').value = '';
                }
            } catch (error) {
                console.error(error);
                mostrarAviso("Erro ao conectar ao servidor.", "erro");
            } finally {
                btn.disabled = false;
                if(idAviso) {
                    btn.innerHTML = '<i class="fa-solid fa-check"></i> <span id="texto-btn-salvar">Salvar Alteração</span>';
                } else {
                    btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> <span id="texto-btn-salvar">Publicar</span>';
                }
            }
        };

        // Preparar formulário para Edição
        window.prepararEdicao = function(id, titulo, descricao) {
            document.getElementById('titulo-form-aviso').innerText = "Editar Aviso";
            document.getElementById('aviso-id').value = id;
            document.getElementById('aviso-titulo').value = titulo;
            document.getElementById('aviso-descricao').value = descricao;
            
            document.getElementById('btn-cancelar-aviso').classList.remove('hidden');
            document.getElementById('texto-btn-salvar').innerText = "Salvar Alteração";
            document.getElementById('btn-salvar-aviso').classList.replace('bg-amber-500', 'bg-blue-600');
            document.getElementById('btn-salvar-aviso').classList.replace('hover:bg-amber-600', 'hover:bg-blue-700');
            
            document.getElementById('aba-avisos').scrollTo(0,0);
        };

        // Cancelar Edição (limpa tudo)
        window.cancelarEdicao = function() {
            document.getElementById('titulo-form-aviso').innerText = "Publicar Novo Aviso";
            document.getElementById('aviso-id').value = '';
            document.getElementById('aviso-titulo').value = '';
            document.getElementById('aviso-descricao').value = '';
            
            document.getElementById('btn-cancelar-aviso').classList.add('hidden');
            document.getElementById('texto-btn-salvar').innerText = "Publicar";
            document.getElementById('btn-salvar-aviso').classList.replace('bg-blue-600', 'bg-amber-500');
            document.getElementById('btn-salvar-aviso').classList.replace('hover:bg-blue-700', 'hover:bg-amber-600');
        };

        // Excluir Aviso
        window.excluirAviso = async function(id) {
            if(confirm("Tem certeza que deseja excluir este aviso? Ele sumirá do aplicativo do cidadão.")) {
                try {
                    await deleteDoc(doc(db, "avisos", id));
                    mostrarAviso("Aviso excluído com sucesso!");
                    
                    if(document.getElementById('aviso-id').value === id) {
                        cancelarEdicao();
                    }
                } catch (error) {
                    mostrarAviso("Erro ao excluir o aviso.", "erro");
                }
            }
        };

        window.fazerLogout = function() {
            if(confirm("Deseja realmente sair?")) {
                alert("Logout concluído. (Você pode redirecionar para a tela index do app geral)");
                window.location.href = "index.html";
            }
        };
    </script>
</body>
</html>
